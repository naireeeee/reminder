<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@300;500&family=Cormorant+Garamond:ital,wght@1,500;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --glow: rgba(212, 175, 55, 0.2);
            --bg-color: #020617;
            --aura-color: rgba(212, 175, 55, 0);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background: var(--bg-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
            overflow: hidden;
            perspective: 2000px;
            transition: background 1.5s ease;
        }

        #star-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(1px);
        }

        /* Comet Tail Cursor */
        .cursor-dot {
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
        }

        .cursor-trail {
            width: 20px; height: 20px;
            border: 1px solid #bf953f;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease-out, background 0.3s;
            box-shadow: 0 0 15px var(--glow);
        }

        /* Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            background: var(--gold-gradient);
            border-radius: 50%;
            z-index: 100;
        }

        /* Streak Counter */
        #streak-counter {
            position: fixed;
            top: 30px;
            right: 30px;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        #streak-counter span { color: #bf953f; }

        #copy-notif {
            position: fixed;
            top: 30px;
            background: rgba(191, 149, 63, 0.1);
            padding: 12px 25px;
            border: 1px solid #bf953f;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 1000;
        }

        #copy-notif.show { opacity: 1; transform: translateY(10px); }

        .compass-container {
            position: relative;
            width: 650px;
            height: 650px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            animation: float 8s infinite ease-in-out;
        }

        /* Aura Glow on Hover */
        .compass-container::before {
            content: '';
            position: absolute;
            width: 120%; height: 120%;
            background: radial-gradient(circle, var(--aura-color) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 1s ease, background 1s ease;
            z-index: -1;
            pointer-events: none;
        }

        .compass-container:hover::before {
            opacity: 1;
            animation: pulseAura 4s infinite;
        }

        .ring-outer {
            position: absolute;
            width: 100%; height: 100%;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: radial-gradient(circle, transparent 60%, rgba(212,175,55,0.05) 100%);
        }

        .ring-outer::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px dashed rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: rotate 120s linear infinite;
        }

        .content-vessel {
            position: relative;
            z-index: 10;
            width: 80%; height: 80%;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.05), 0 50px 100px rgba(0,0,0,0.8);
            transform: translateZ(150px);
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 0.7rem;
            letter-spacing: 12px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .main-verse {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            line-height: 1.2;
            font-style: italic;
            margin-bottom: 25px;
            text-wrap: balance;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ref {
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #bf953f;
            font-weight: 700;
        }

        .orb-trigger {
            margin-top: 40px;
            width: 65px; height: 65px;
            border-radius: 50%;
            border: none;
            background: var(--gold-gradient);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px var(--glow);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }

        .orb-trigger:hover { transform: scale(1.2) rotate(90deg); }

        .mood-nav {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .mood-link {
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            font-family: 'Quicksand';
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .mood-link.active { color: #fff; text-shadow: 0 0 10px #fff; }
        .mood-link.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            width: 5px; height: 5px;
            background: #bf953f;
            border-radius: 50%;
            transform: translateX(-50%);
        }

        .copy-btn {
            color: #bf953f !important;
            opacity: 0.6;
            margin-left: 15px;
            border: 1px solid rgba(191, 149, 63, 0.3) !important;
            border-radius: 20px;
        }
        .copy-btn:hover { opacity: 1; background: rgba(191, 149, 63, 0.1); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(5deg); }
        }
        @keyframes pulseAura {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .fade-exit { opacity: 0; transform: scale(0.9) translateY(-20px); filter: blur(10px); }
        .fade-enter { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }

        @media (max-width: 768px) {
            .compass-container { width: 90vw; height: 90vw; }
            .main-verse { font-size: 1.5rem; }
            .content-vessel { padding: 30px; }
            .mood-nav { bottom: 20px; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<div id="streak-counter">Seeds Today: <span>0</span></div>
<div id="copy-notif">Verse Copied to Soul</div>
<div class="cursor-dot"></div>
<div class="cursor-trail"></div>
<canvas id="star-canvas"></canvas>

<div class="compass-container" id="compass">
    <div class="ring-outer"></div>
    
    <div class="content-vessel">
        <h1>Celestial Compass</h1>
        <div id="display-area">
            <div class="main-verse" id="text">"Be still, and know that I am God."</div>
            <div class="ref" id="ref">Psalm 46:10</div>
        </div>
        
        <button class="orb-trigger" onclick="changeVerse(event)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3e2b00" stroke-width="2">
                <path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z"/>
            </svg>
        </button>
    </div>
</div>

<div class="mood-nav">
    <button class="mood-link active" onclick="setMood('strength', this)">Strength</button>
    <button class="mood-link" onclick="setMood('peace', this)">Peace</button>
    <button class="mood-link" onclick="setMood('hope', this)">Hope</button>
    <button class="mood-link copy-btn" onclick="copyVerse()">Copy</button>
</div>

<script>
/* 1. STAR ENGINE */
const canvas = document.getElementById('star-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<250; i++) { // More stars
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: Math.random() * canvas.width,
            o: Math.random(),
            s: Math.random() * 2 // Variable speed
        });
    }
}

function draw() {
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
        s.z -= (0.5 + s.s); // Use star's own speed
        if(s.z <= 0) s.z = canvas.width;
        let sx = (s.x - canvas.width/2) * (canvas.width/s.z) + canvas.width/2;
        let sy = (s.y - canvas.height/2) * (canvas.width/s.z) + canvas.height/2;
        let size = (1 - s.z/canvas.width) * 3;
        
        // Star color based on current bg color
        let currentBg = getComputedStyle(document.body).getPropertyValue('--bg-color');
        ctx.fillStyle = s.o > 0.8 ? '#fff' : `rgba(212, 175, 55, ${s.o})`; 
        
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(draw);
}
init(); draw();

/* 2. COMET CURSOR & PARALLAX */
const dot = document.querySelector('.cursor-dot');
const trail = document.querySelector('.cursor-trail');
let mouseX = 0, mouseY = 0;
let dotX = 0, dotY = 0;
let trailX = 0, trailY = 0;

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    
    // Parallax
    const x = (window.innerWidth / 2 - e.pageX) / 30;
    const y = (window.innerHeight / 2 - e.pageY) / 30;
    document.getElementById('compass').style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
});

function animateCursor() {
    // Smooth follow logic (lerp)
    dotX += (mouseX - dotX) * 0.3;
    dotY += (mouseY - dotY) * 0.3;
    trailX += (mouseX - trailX) * 0.15;
    trailY += (mouseY - trailY) * 0.15;
    
    dot.style.left = dotX + 'px';
    dot.style.top = dotY + 'px';
    trail.style.left = trailX - 10 + 'px'; // Offset trail center
    trail.style.top = trailY - 10 + 'px';
    
    requestAnimationFrame(animateCursor);
}
animateCursor();

/* 3. AUDIO ENGINE (Synthesized sounds) */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    if (type === 'chime') { // Verse appear sound
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
        osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // A6
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
        osc.start();
        osc.stop(audioCtx.currentTime + 1);
    } else if (type === 'whoosh') { // Mood click sound
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(110, audioCtx.currentTime); // A2
        osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.2); // A4
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }
}

/* 4. VERSE & PARTICLE ENGINE */
const library = {
    strength: [
        { t: "The Lord is my light and my salvation; whom shall I fear?", r: "Psalm 27:1" },
        { t: "I can do all things through Christ who strengthens me.", r: "Philippians 4:13" },
        { t: "Be strong and courageous. Do not be afraid.", r: "Joshua 1:9" },
        { t: "But the Lord stood with me and gave me strength.", r: "2 Timothy 4:17" }
    ],
    peace: [
        { t: "Peace I leave with you; my peace I give to you.", r: "John 14:27" },
        { t: "The Lord blesses his people with peace.", r: "Psalm 29:11" },
        { t: "And the peace of God, which transcends all understanding.", r: "Philippians 4:7" },
        { t: "You keep him in perfect peace whose mind is stayed on you.", r: "Isaiah 26:3" }
    ],
    hope: [
        { t: "For I know the plans I have for you, declares the Lord.", r: "Jeremiah 29:11" },
        { t: "Faith is the assurance of things hoped for.", r: "Hebrews 11:1" },
        { t: "Hope does not put us to shame.", r: "Romans 5:5" },
        { t: "But those who hope in the Lord will renew their strength.", r: "Isaiah 40:31" }
    ]
};

const moodSettings = {
    strength: { bg: '#1a0f00', aura: 'rgba(212, 175, 55, 0.3)' },
    peace: { bg: '#000f1a', aura: 'rgba(100, 150, 255, 0.2)' },
    hope: { bg: '#001a0f', aura: 'rgba(100, 255, 150, 0.2)' }
};

let currentMood = 'strength';
let streak = 0;

function createParticles(x, y) {
    playSound('chime');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 5 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        document.body.appendChild(p);
        
        const destX = x + (Math.random() - 0.5) * 300;
        const destY = y + (Math.random() - 0.5) * 300;

        p.animate([
            { transform: `translate(${x}px, ${y}px)`, opacity: 1 },
            { transform: `translate(${destX}px, ${destY}px)`, opacity: 0 }
        ], {
            duration: 1000 + Math.random() * 800,
            easing: 'cubic-bezier(0, .9, .57, 1)'
        }).onfinish = () => p.remove();
    }
}

function updateStreak() {
    streak++;
    document.querySelector('#streak-counter span').innerText = streak;
}

function setMood(mood, btn) {
    currentMood = mood;
    playSound('whoosh');
    document.querySelectorAll('.mood-link').forEach(l => l.classList.remove('active'));
    btn.classList.add('active');
    
    // Apply dynamic colors
    const settings = moodSettings[mood];
    document.body.style.setProperty('--bg-color', settings.bg);
    document.body.style.setProperty('--aura-color', settings.aura);
    
    changeVerse();
}

function changeVerse(e) {
    let clickX, clickY;
    if(e) {
        clickX = e.clientX;
        clickY = e.clientY;
    } else {
        // Default to center if no event (like on load)
        clickX = window.innerWidth / 2;
        clickY = window.innerHeight / 2;
    }
    
    createParticles(clickX, clickY);
    updateStreak();
    
    const area = document.getElementById('display-area');
    const t = document.getElementById('text');
    const r = document.getElementById('ref');
    
    area.classList.add('fade-exit');
    
    setTimeout(() => {
        const pool = library[currentMood];
        const rand = pool[Math.floor(Math.random() * pool.length)];
        t.innerText = `"${rand.t}"`;
        r.innerText = rand.r;
        area.classList.remove('fade-exit');
        area.classList.add('fade-enter');
        setTimeout(() => area.classList.remove('fade-enter'), 800);
    }, 500);
}

function copyVerse() {
    playSound('whoosh');
    const text = document.getElementById('text').innerText;
    const ref = document.getElementById('ref').innerText;
    navigator.clipboard.writeText(`${text} - ${ref}`).then(() => {
        const notif = document.getElementById('copy-notif');
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 2000);
    });
}

// Auto-seed on load
window.onload = () => {
    // Need user interaction to unlock audio
    document.body.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: true });

    const day = new Date().getDate();
    const moods = ['strength', 'peace', 'hope'];
    const btns = document.querySelectorAll('.mood-link');
    setMood(moods[day % 3], btns[day % 3]);
};
</script>

</body>
</html>
