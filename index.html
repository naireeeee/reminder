<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Bouquet of Thoughts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================================================
   RESET & BASE (Simplified)
========================================================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    font-family: "Quicksand", "Segoe UI", sans-serif;
    /* Soft, calm tulip-inspired gradient */
    background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #4a4a4a;
}

/* =========================================================
   CARD DESIGN
========================================================= */
.wrapper {
    width: 90%;
    max-width: 500px;
}

.card {
    background: #ffffff;
    border-radius: 32px;
    padding: 50px 40px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(161, 196, 253, 0.15); /* Light blue shadow */
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
    overflow: hidden;
}

/* Floating Tulip Decoration instead of sparkle */
.card::before {
    content: '🌷';
    position: absolute;
    top: 25px;
    right: 30px;
    font-size: 1.8rem;
    opacity: 0.4;
}

/* =========================================================
   HEADER
========================================================= */
.header h1 {
    font-size: 2.2rem;
    color: #d63384; /* Tulip Pink */
    margin-bottom: 12px;
}

.header p {
    font-size: 0.95rem;
    color: #9ea0a5;
    margin-bottom: 35px;
    font-weight: 500;
}

/* =========================================================
   MESSAGE BOX
========================================================= */
.message-container {
    background: #fffafa; /* Very light pink background */
    border-radius: 24px;
    padding: 35px 25px;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed #f8bbd0; /* Soft pink border */
}

.message {
    font-size: 1.25rem;
    line-height: 1.6;
    font-weight: 500;
    color: #5d5d5d;
    transition: all 0.4s ease;
}

/* =========================================================
   BUTTON
========================================================= */
button {
    margin-top: 35px;
    padding: 16px 45px;
    border-radius: 50px;
    border: none;
    background: #d63384; /* Tulip Pink */
    color: #fff;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(214, 51, 132, 0.3);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

button:hover {
    background: #c2185b; /* Darker Pink */
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(194, 24, 91, 0.4);
}

button:active {
    transform: scale(0.95);
}

.signature {
    margin-top: 40px;
    font-size: 0.9rem;
    color: #cbd0d8;
    letter-spacing: 0.5px;
}

/* =========================================================
   ANIMATIONS
========================================================= */
.fade-out { opacity: 0; transform: translateY(10px); }
.fade-in { opacity: 1; transform: translateY(0); }

</style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <div class="header">
            <h1>Hey, For You! 🌷</h1>
            <p>A little space for whenever things get heavy.</p>
        </div>

        <div class="message-container">
            <div class="message fade-in" id="message">
                Take a deep breath. <br>
                I just wanted you to know how proud I am of you.
            </div>
        </div>

        <button onclick="nextMessage()">Next</button>

        <div class="signature">
            — I've always got your back.
        </div>
    </div>
</div>

<script>
/* =========================================================
   CHEER-UP MESSAGES (English)
========================================================= */
const messages = [
    "You've survived 100% of your hardest days so far. You're doing great.",
    "Don't be so hard on yourself. You're a work in progress, and that's beautiful.",
    "If you're tired, learn to rest not to quit.",
    "Your feelings are valid. Take all the time you need to feel okay again.",
    "You are enough. Not because of what you do, but because of who you are.",
    "The world is a better place just because you're in it. Seriously.",
    "It’s okay to have a bad day. It doesn't mean you have a bad life.",
    "You don't have to figure everything out today. Just focus on the next small step.",
    "I believe in you, even when you find it hard to believe in yourself.",
    "You're not alone in this. I'm just a text away, always."
];

let index = 0;

function nextMessage() {
    const msg = document.getElementById("message");
    msg.classList.remove("fade-in");
    msg.classList.add("fade-out");

    setTimeout(() => {
        index = (index + 1) % messages.length;
        msg.innerHTML = messages[index];
        msg.classList.remove("fade-out");
        msg.classList.add("fade-in");
    }, 300);
}
</script>

</body>
</html>
